project: OPMesm-protein-localization
entity: udel

program: train_sweep.py
method: bayes
metric:
  name: val_loss
  goal: minimize

# Early stopping to kill bad runs quickly
early_terminate:
  type: hyperband
  min_iter: 5
  eta: 3

parameters:
  # Shifted Down: Model wants to explore below 5e-5
  lr_classifier:
    distribution: log_uniform_values
    min: 0.00001  # 1e-5
    max: 0.0001   # 1e-4
    
  # Shifted Up: Model wants to explore above 5e-5
  lr_esmc:
    distribution: log_uniform_values
    min: 0.00001  # 1e-5
    max: 0.0001   # 1e-4
    
  # Narrowed: '4' is the dominant winner
  lora_r:
    values: [2, 4, 8]
    
  # Centered: Covering the spread of the top 10 runs
  lora_dropout:
    distribution: uniform
    min: 0.15
    max: 0.45

  # Shifted Up: The model maxed out at 0.4, offering 0.5 to see if it improves
  classify_dropout:
    values: [0.3, 0.4, 0.5]



